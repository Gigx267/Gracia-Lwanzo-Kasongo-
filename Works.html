<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Gracia Lwanzo Kasongo — limited edition mixed media paintings celebrating African femininity, Adinkrahene symbolism, and spiritual sovereignty.">
    <title>Gracia Lwanzo Kasongo | Artworks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <!-- Stripe.js -->
    <script src="https://js.stripe.com/v3/">
    </script>
    <style>
        /* ------------------------------------------------------------------
           BOLD PALETTE: PINK · BLACK · ORANGE
           Edgy, vibrant, and sophisticated
        ------------------------------------------------------------------ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #0d0a0c;
            --bg-elevated: #1a1216;
            --text-primary: #f5eee8;
            --text-secondary: #cbc4bc;
            --accent-pink: #e85a8a;
            --accent-pink-dark: #c94474;
            --accent-pink-glow: rgba(232, 90, 138, 0.25);
            --accent-orange: #f09b5a;
            --accent-orange-glow: rgba(240, 155, 90, 0.2);
            --gold-primary: #e8c87a;
            --border-subtle: rgba(232, 90, 138, 0.15);
            --card-bg: rgba(20, 14, 18, 0.8);
            --transition-smooth: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            --shadow-strong: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-deep: #f7f3ee;
                --bg-elevated: rgba(255, 255, 255, 0.92);
                --text-primary: #161616;
                --text-secondary: #5e5e5e;
                --accent-pink: #bb5a85;
                --accent-pink-dark: #9a456e;
                --accent-pink-glow: rgba(187, 90, 133, 0.2);
                --accent-orange: #d47b46;
                --accent-orange-glow: rgba(212, 123, 70, 0.15);
                --gold-primary: #b78f54;
                --border-subtle: rgba(187, 90, 133, 0.12);
                --card-bg: rgba(255, 255, 255, 0.82);
                --shadow-strong: 0 20px 40px rgba(0, 0, 0, 0.12);
            }

            body {
                background: radial-gradient(circle at top left, rgba(187, 90, 133, 0.06), transparent 45%),
                            radial-gradient(circle at bottom right, rgba(212, 123, 70, 0.04), transparent 45%),
                            var(--bg-deep);
                color: var(--text-primary);
            }

            body::before {
                background-image: radial-gradient(circle at 15% 25%, rgba(187, 90, 133, 0.06) 2px, transparent 2px),
                                  radial-gradient(circle at 85% 70%, rgba(212, 123, 70, 0.06) 2px, transparent 2px);
            }

            .navbar.scrolled {
                background: rgba(255, 255, 255, 0.92);
            }

            .card-media {
                background: #f5f1ed;
            }

            .lightbox {
                background: rgba(245, 241, 237, 0.96);
            }

            .lb-container {
                background: rgba(255, 255, 255, 0.95);
            }

            .lb-img {
                background: #f5f1ed;
            }

            .lb-details {
                background: rgba(255, 255, 255, 0.92);
            }

            .audio-widget {
                background: rgba(255, 255, 255, 0.85);
                border-color: rgba(187, 90, 133, 0.12);
            }

            .audio-btn {
                color: var(--text-primary);
                border-color: rgba(212, 123, 70, 0.3);
            }
        }

        body {
            background: radial-gradient(circle at top left, rgba(232, 90, 138, 0.08), transparent 45%),
                        radial-gradient(circle at bottom right, rgba(240, 155, 90, 0.06), transparent 45%),
                        var(--bg-deep);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
            scroll-behavior: smooth;
        }

        /* ambient texture overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle at 15% 25%, rgba(232, 90, 138, 0.04) 2px, transparent 2px),
                              radial-gradient(circle at 85% 70%, rgba(240, 155, 90, 0.04) 2px, transparent 2px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 1rem 2rem;
            transition: var(--transition-smooth);
            background: transparent;
        }

        .navbar.scrolled {
            background: rgba(13, 10, 12, 0.92);
            backdrop-filter: blur(20px);
            padding: 0.6rem 2rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        .nav-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            text-decoration: none;
            background: linear-gradient(135deg, #fff 20%, var(--accent-pink) 60%, var(--accent-orange) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 400;
            font-size: 0.8rem;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            transition: color 0.2s;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-pink);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--accent-pink);
        }

        .contact-btn {
            border: 1px solid rgba(232, 90, 138, 0.3);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            transition: background 0.2s;
            background: rgba(232, 90, 138, 0.05);
        }

        .contact-btn:hover {
            background: rgba(232, 90, 138, 0.18);
            border-color: var(--accent-pink);
            color: var(--text-primary) !important;
        }

        .menu-icon {
            display: none;
            flex-direction: column;
            background: transparent;
            border: none;
            cursor: pointer;
            gap: 6px;
            z-index: 1002;
        }

        .menu-icon span {
            width: 26px;
            height: 2px;
            background: var(--text-primary);
            transition: 0.2s;
            border-radius: 2px;
        }

        .hero {
            text-align: center;
            padding: 9rem 2rem 3rem 2rem;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 6;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #fff, var(--accent-pink), var(--accent-orange));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .hero p {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
            font-weight: 300;
        }

        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem 5rem;
            position: relative;
            z-index: 6;
        }

        .art-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .art-card {
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            overflow: hidden;
            transition: var(--transition-smooth);
            cursor: pointer;
            border: 1px solid var(--border-subtle);
            transform: translateY(0);
            display: flex;
            flex-direction: column;
        }

        .art-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-pink);
            box-shadow: 0 25px 45px -15px rgba(232, 90, 138, 0.2), var(--shadow-strong);
        }

        .card-media {
            position: relative;
            aspect-ratio: 3 / 4;
            overflow: hidden;
            background: #1a1216;
        }

        .card-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.2, 0.9, 0.3, 1);
        }

        .art-card:hover .card-media img {
            transform: scale(1.03);
        }

        .badge {
            position: absolute;
            top: 0.8rem;
            right: 0.8rem;
            background: var(--accent-orange);
            color: #0d0a0c;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 0.25rem 0.9rem;
            border-radius: 30px;
            letter-spacing: 0.8px;
            z-index: 2;
            text-transform: uppercase;
        }

        .badge.sold {
            background: #6b1a2e;
            color: #f5eee8;
        }

        .badge.preorder {
            background: var(--accent-pink);
            color: #fff;
        }

        .card-info {
            padding: 1.2rem 1.2rem 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .art-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: -0.2px;
            margin-bottom: 0.2rem;
            color: var(--text-primary);
        }

        .art-sub {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--accent-orange);
            letter-spacing: 1.2px;
            margin-bottom: 0.6rem;
        }

        .art-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 1rem;
            flex: 1;
        }

        .art-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-top: 1px solid var(--border-subtle);
            padding-top: 0.8rem;
            margin-top: 0.2rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .dimensions {
            font-size: 0.65rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .dimensions strong {
            color: var(--text-primary);
            font-weight: 500;
        }

        .price {
            font-family: 'Inter', monospace;
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--accent-orange);
        }

        .price.sold-price {
            color: #666;
            text-decoration: line-through;
        }

        .buy-btn {
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-orange));
            border: none;
            color: #0d0a0c;
            font-weight: 700;
            font-size: 0.65rem;
            letter-spacing: 0.8px;
            padding: 0.6rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            margin-top: 0.6rem;
            width: 100%;
            text-align: center;
        }

        .buy-btn:hover {
            transform: scale(0.97);
            box-shadow: 0 4px 20px rgba(232, 90, 138, 0.3);
        }

        .buy-btn:active {
            transform: scale(0.95);
        }

        .buy-btn.sold-btn {
            background: #333;
            color: #666;
            cursor: not-allowed;
            box-shadow: none;
        }

        .buy-btn.sold-btn:hover {
            transform: none;
        }

        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 8, 0.96);
            backdrop-filter: blur(20px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease, visibility 0s 0.3s;
        }

        .lightbox.active {
            visibility: visible;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .lb-container {
            display: flex;
            flex-wrap: wrap;
            max-width: 1200px;
            width: 92%;
            background: rgba(13, 10, 12, 0.95);
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(232, 90, 138, 0.2);
            max-height: 90vh;
        }

        .lb-img {
            flex: 1.2;
            min-width: 260px;
            background: #0d0a0c;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lb-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            max-height: 80vh;
        }

        .lb-details {
            flex: 1;
            padding: 2rem 2rem 2.5rem;
            background: rgba(13, 10, 12, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .lb-close {
            position: absolute;
            top: 1.5rem;
            right: 2rem;
            font-size: 2.8rem;
            color: var(--text-primary);
            background: none;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 300;
            line-height: 1;
        }

        .lb-close:hover {
            color: var(--accent-pink);
            transform: scale(1.05);
        }

        .audio-widget {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: rgba(13, 10, 12, 0.8);
            backdrop-filter: blur(14px);
            padding: 0.5rem 1rem;
            border-radius: 60px;
            display: flex;
            gap: 0.6rem;
            align-items: center;
            z-index: 999;
            border: 1px solid var(--border-subtle);
            font-size: 0.8rem;
        }

        .audio-btn {
            background: transparent;
            border: 1px solid rgba(240, 155, 90, 0.3);
            color: var(--text-primary);
            padding: 0.25rem 0.7rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.65rem;
            font-weight: 500;
            transition: 0.2s;
        }

        .audio-btn:hover {
            background: var(--accent-pink);
            color: #0d0a0c;
            border-color: var(--accent-pink);
        }

        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid var(--border-subtle);
            font-size: 0.7rem;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            position: relative;
            z-index: 6;
        }

        @media (max-width: 780px) {
            .menu-icon {
                display: flex;
            }
            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 70%;
                height: 100vh;
                background: rgba(13, 10, 12, 0.97);
                flex-direction: column;
                justify-content: center;
                gap: 2rem;
                transition: 0.3s ease;
                backdrop-filter: blur(24px);
                z-index: 1001;
                border-left: 1px solid rgba(232, 90, 138, 0.15);
                padding: 2rem;
            }
            .nav-links.open {
                right: 0;
            }
            .logo {
                z-index: 1002;
                font-size: 1.4rem;
            }
            .hero h1 {
                font-size: 2.2rem;
            }
            .lb-container {
                flex-direction: column;
                max-height: 95vh;
                overflow-y: auto;
                width: 96%;
                border-radius: 20px;
            }
            .lb-img {
                min-width: unset;
                max-height: 50vh;
            }
            .lb-img img {
                max-height: 50vh;
                object-fit: cover;
            }
            .lb-details {
                padding: 1.5rem;
            }
            .audio-widget {
                bottom: 1rem;
                right: 1rem;
                padding: 0.3rem 0.8rem;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .art-card {
            animation: fadeIn 0.5s ease forwards;
        }
    </style>
</head>

                <span></span><span></span><span></span>

            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>

                <li><a href="shop.html">Shop</a></li>

    <main>

            <p>Limited edition mixed-media paintings celebrating African femininity, Adinkrahene symbolism, and spiritual sovereignty.</p>
        </div>

            <div class="art-grid" id="artGrid"></div>

    </main>

                <img id="lightboxImg" src="" alt="Artwork detail">

        <span>🎧</span>

        <button id="muteMusicBtn" class="audio-btn">Mute</button>
    </div>
    <audio id="ambientMusic" loop preload="metadata">
        <source src="mm2.mp3" type="audio/mpeg">
    </audio>

    <footer>
        <p>© Gracia Lwanzo Kasongo — All works registered with Certificate of Authenticity</p>
    </footer>

    <script>
        (function() {
            // --------------------------------------------------------------
            // STRIPE CONFIG (demo)
            // --------------------------------------------------------------
            const STRIPE_PUBLISHABLE_KEY = 'pk_test_51Qj3lAP5V5PqVzR7N9cBwEHZREprsFFdYQjSLK9GpZB55CfcPzDmP0NWFBNhQxJhE2P4pQl2TfZ5c7fS4Vd3rX1H2m8nBvC9wX';
            const stripe = Stripe(STRIPE_PUBLISHABLE_KEY);

            const artworks = [{
                id: 1,
                title: "The Bloom of Consciousness",
                subtitle: "Bold Line Fauvism",
                desc: "Celebrates the vibrant architecture of the mind and beauty with neo-expressionist fire.",
                dimensions: "30 × 40 cm",
                price: "€330",
                priceCents: 33000,
                img: "xz (9).jpeg",
                badge: null,
                framed: "Framed + CoA",
                sold: false
            }, {
                id: 2,
                title: "The Awakening of Mawu",
                subtitle: "Mixed Media with Real Cauris",
                desc: "Symbolizes the power of a single spark to illuminate darkness and change the world.",
                dimensions: "30 × 40 cm",
                price: "€390",
                priceCents: 39000,
                img: "xz (10).jpeg",
                badge: null,
                framed: "Standard Cut",
                sold: false
            }, {
                id: 3,
                title: "Ua wa roho",
                subtitle: "Acrylic & Mixed Media with Shells",
                desc: "“Spirit of the Heart” — a spiritual exploration of self-connection and ancestral wisdom.",
                dimensions: "42 × 59.4 cm",
                price: "€613",
                priceCents: 61300,
                img: "xz (12).jpeg",
                badge: "SOLD",
                framed: "Framed + CoA",
                sold: true
            }, {
                id: 9,
                title: "Beauty in the Burden",
                subtitle: "Mixed Media • Work in Progress",
                desc: "Evolution of Adinkrahene and floral spirit into refined modern femininity.",
                dimensions: "42 × 59.4 cm",
                price: "€1,230",
                priceCents: 123000,
                img: "xzz.png",
                badge: "PRE-ORDER",
                framed: "Framed + CoA",
                sold: false
            }, {
                id: 4,
                title: "Rhythms of Breath",
                subtitle: "Acrylic & Mixed Media with Shells",
                desc: "Symbolism with bold contemporary expressionism.",
                dimensions: "42 × 59.4 cm",
                price: "€417",
                priceCents: 41700,
                img: "xzz2.png",
                badge: null,
                framed: "Framed + CoA",
                sold: false
            }];

            const gridContainer = document.getElementById('artGrid');
            const lightboxEl = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            const lightboxDetails = document.getElementById('lightboxDetails');

            async function handlePurchase(productName, amountCents, productId) {
                try {
                    alert(`[DEMO] Redirect to Stripe for: ${productName} (€${(amountCents/100).toFixed(2)})`);
                } catch (error) {
                    console.error('Checkout error:', error);
                    alert(`[DEMO] Purchase: ${productName} (€${(amountCents/100).toFixed(2)})`);
                }
            }

            function renderArtworks() {
                if (!gridContainer) return;
                gridContainer.innerHTML = '';
                artworks.forEach(art => {
                    const card = document.createElement('div');
                    card.className = 'art-card';
                    card.setAttribute('data-id', art.id);
                    card.setAttribute('role', 'button');
                    card.setAttribute('tabindex', '0');
                    card.setAttribute('aria-label', `View details for ${art.title}`);

                    let badgeHTML = '';
                    if (art.badge) {
                        let badgeClass = 'badge';
                        if (art.sold) badgeClass += ' sold';
                        else if (art.badge === 'PRE-ORDER') badgeClass += ' preorder';
                        badgeHTML = `<div class="${badgeClass}">${art.badge}</div>`;
                    }

                    const priceClass = art.sold ? 'price sold-price' : 'price';
                    const buyBtnClass = art.sold ? 'buy-btn sold-btn' : 'buy-btn';
                    const buyText = art.sold ? 'Sold Out' : 'Buy now';

                    card.innerHTML = `
                        <div class="card-media">
                            <img src="${art.img}" alt="${art.title}" loading="lazy" onerror="this.onerror=null;this.src='https://placehold.co/800x1000/1a1216/f5eee8?text=Artwork';">
                            ${badgeHTML}
                        </div>
                        <div class="card-info">
                            <h3 class="art-title">${art.title}</h3>
                            <div class="art-sub">${art.subtitle}</div>
                            <p class="art-desc">${art.desc}</p>
                            <div class="art-meta">
                                <div class="dimensions"><strong>${art.dimensions}</strong><br>${art.framed}</div>
                                <div class="${priceClass}">${art.price}</div>
                            </div>
                            <button class="${buyBtnClass}" data-id="${art.id}" data-price="${art.priceCents}" data-name="${art.title}" ${art.sold ? 'disabled' : ''}>${buyText}</button>
                        </div>
                    `;

                    card.addEventListener('click', (e) => {
                        if (e.target.closest('.buy-btn')) return;
                        openLightbox(art);
                    });
                    card.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            if (!e.target.closest('.buy-btn')) openLightbox(art);
                        }
                    });

                    const buyBtn = card.querySelector('.buy-btn');
                    if (buyBtn && !art.sold) {
                        buyBtn.addEventListener('click', async (e) => {
                            e.stopPropagation();
                            const name = buyBtn.dataset.name;
                            const priceCents = parseInt(buyBtn.dataset.price, 10);
                            const id = buyBtn.dataset.id;
                            await handlePurchase(name, priceCents, id);
                        });
                    }

                    gridContainer.appendChild(card);
                });
            }

            function openLightbox(art) {
                lightboxImg.src = art.img;
                lightboxImg.alt = art.title;

                const priceHTML = art.sold ?
                    `<span style="color: #666; text-decoration: line-through; font-size: 1.8rem;">${art.price}</span> <span style="color: #6b1a2e; font-size: 1rem; margin-left: 0.5rem;">(SOLD)</span>` :
                    `<span class="price" style="font-size: 1.8rem; color: var(--accent-orange);">${art.price}</span>`;

                const buyBtnHTML = art.sold ?
                    `<button class="buy-btn sold-btn" disabled style="margin-top:2rem; width:auto; padding:0.8rem 2.5rem;">Sold Out</button>` :
                    `<button class="buy-btn" data-id="${art.id}" data-price="${art.priceCents}" data-name="${art.title}" style="margin-top:2rem; width:auto; padding:0.8rem 2.5rem; font-size:0.8rem;">Buy now — ${art.price}</button>`;

                lightboxDetails.innerHTML = `
                    <h2 style="font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 600; margin-bottom: 0.3rem; letter-spacing: -0.3px; color: var(--text-primary);">${art.title}</h2>
                    <p style="color: var(--accent-orange); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.8px; margin-bottom: 1.2rem;">${art.subtitle}</p>
                    <p style="color: var(--text-secondary); font-size: 0.9rem; line-height: 1.6; margin-bottom: 1.5rem;">${art.desc}</p>
                    <div style="border-top: 1px solid var(--border-subtle); padding-top: 1.2rem; display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap;">
                        <div><span style="font-size:0.65rem; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.5px;">Dimensions</span><br><strong style="font-size:1rem; font-weight:500;">${art.dimensions}</strong><br><span style="font-size:0.7rem; color:var(--accent-pink);">${art.framed}</span></div>
                        <div>${priceHTML}</div>
                    </div>
                    ${buyBtnHTML}
                `;

                const lbBuyBtn = lightboxDetails.querySelector('.buy-btn:not(.sold-btn)');
                if (lbBuyBtn) {
                    lbBuyBtn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        const name = lbBuyBtn.dataset.name;
                        const priceCents = parseInt(lbBuyBtn.dataset.price, 10);
                        const id = lbBuyBtn.dataset.id;
                        await handlePurchase(name, priceCents, id);
                    });
                }

                lightboxEl.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeLightbox() {
                lightboxEl.classList.remove('active');
                document.body.style.overflow = '';
            }

            document.getElementById('closeLightboxBtn')?.addEventListener('click', closeLightbox);
            lightboxEl?.addEventListener('click', (e) => {
                if (e.target === lightboxEl) closeLightbox();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && lightboxEl.classList.contains('active')) closeLightbox();
            });

            const menuToggle = document.getElementById('menuToggle');
            const navLinks = document.getElementById('navLinks');
            if (menuToggle && navLinks) {
                menuToggle.addEventListener('click', () => {
                    navLinks.classList.toggle('open');
                    const expanded = navLinks.classList.contains('open');
                    menuToggle.setAttribute('aria-expanded', expanded);
                });
                document.querySelectorAll('.nav-links a').forEach(link => {
                    link.addEventListener('click', () => {
                        navLinks.classList.remove('open');
                        if (menuToggle) menuToggle.setAttribute('aria-expanded', 'false');
                    });
                });
            }

            const navbar = document.getElementById('navbar');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 30) navbar.classList.add('scrolled');
                else navbar.classList.remove('scrolled');

                if (navLinks && navLinks.classList.contains('open')) {
                    navLinks.classList.remove('open');
                    if (menuToggle) menuToggle.setAttribute('aria-expanded', 'false');
                }
            });

            const audio = document.getElementById('ambientMusic');
            const playBtn = document.getElementById('playMusicBtn');
            const muteBtn = document.getElementById('muteMusicBtn');

            if (audio) {
                audio.volume = 0.25;
                let autoPlayAttempted = false;

                const updateAudioButtons = () => {
                    if (playBtn) playBtn.textContent = audio.paused ? 'Play' : 'Pause';
                    if (muteBtn) muteBtn.textContent = audio.muted ? 'Unmute' : 'Mute';
                };

                const attemptAutoPlay = () => {
                    if (autoPlayAttempted) return;
                    autoPlayAttempted = true;
                    audio.play().then(updateAudioButtons).catch(() => {});
                };

                window.addEventListener('load', () => {
                    attemptAutoPlay();
                    const enableAudio = () => {
                        if (audio.paused && !autoPlayAttempted) {
                            audio.play().catch(() => null);
                        }
                        document.removeEventListener('click', enableAudio);
                        document.removeEventListener('touchstart', enableAudio);
                    };
                    document.addEventListener('click', enableAudio);
                    document.addEventListener('touchstart', enableAudio);
                });

                if (playBtn) {
                    playBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (audio.paused) audio.play().catch(() => null);
                        else audio.pause();
                        updateAudioButtons();
                    });
                }
                if (muteBtn) {
                    muteBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        audio.muted = !audio.muted;
                        updateAudioButtons();
                    });
                }
                audio.addEventListener('playing', updateAudioButtons);
                audio.addEventListener('pause', updateAudioButtons);
            }

            renderArtworks();
            console.log("Artworks page — Pink · Black · Orange palette");
        })();
    </script>
</body>
</html>
